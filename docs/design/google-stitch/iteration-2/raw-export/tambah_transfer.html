<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Subtle pulse for the arrow indicator */
        @keyframes subtlePulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(0, 74, 198, 0.2); }
            50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 0 8px rgba(0, 74, 198, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(0, 74, 198, 0); }
        }

            animation: subtlePulse 2s infinite;
        }

    body {

<body class="bg-background text-on-surface antialiased">
<!-- Main Container: Mobile Optimized -->
<main class="max-w-[480px] mx-auto min-h-screen relative flex flex-col pb-[100px] shadow-[0_0_40px_rgba(0,0,0,0.05)] bg-background">
<!-- Task Header (Transactional - Suppresses standard Nav) -->
<header class="flex items-center justify-between px-lg py-md sticky top-0 bg-background/80 backdrop-blur-md z-20 border-b border-surface-variant/50">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface hover:bg-surface-container-low transition-colors shadow-sm text-text-primary">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-text-primary">Tambah Transfer</h1>
<div class="w-10"></div> <!-- Spacer -->
</header>
<!-- Large Amount Input -->
<section class="px-xl py-2xl flex flex-col items-center justify-center">
<p class="font-label-caps text-label-caps text-text-secondary mb-sm uppercase tracking-wider">Nominal Transfer</p>
<div class="flex items-center justify-center text-primary border-b-2 border-primary-soft pb-xs w-full max-w-[240px] transition-colors focus-within:border-primary">
<span class="font-amount-md text-amount-md mr-xs text-primary-fixed-dim">Rp</span>
<input class="font-amount-lg text-amount-lg bg-transparent border-none text-center w-full focus:outline-none focus:ring-0 p-0 text-primary" inputmode="numeric" placeholder="0" type="text" value="0"/>
</div>
<!-- Quick Add Chips -->
<div class="flex gap-sm mt-md">
<button class="px-3 py-1 rounded-full bg-primary-soft text-primary font-label-caps text-label-caps hover:bg-primary hover:text-on-primary transition-colors">+50rb</button>
<button class="px-3 py-1 rounded-full bg-primary-soft text-primary font-label-caps text-label-caps hover:bg-primary hover:text-on-primary transition-colors">+100rb</button>
<button class="px-3 py-1 rounded-full bg-primary-soft text-primary font-label-caps text-label-caps hover:bg-primary hover:text-on-primary transition-colors">+500rb</button>
</div>
</section>
<!-- Directional UI: Dari -> Ke -->
<section class="px-lg mb-xl">
<div class="bg-surface rounded-[24px] p-lg shadow-[0_4px_20px_rgba(0,74,198,0.05)] border border-surface-variant relative flex items-center justify-between">
<!-- Dari Pocket -->
<div class="flex-1 text-center pr-md">
<p class="font-label-caps text-label-caps text-text-secondary mb-xs">Dari Pocket</p>
<button class="w-full flex flex-col items-center justify-center gap-1 p-sm rounded-xl bg-surface-container-low hover:bg-surface-dim transition-colors border border-transparent hover:border-surface-variant">
<span class="text-2xl mb-1">💰</span>
<div class="flex items-center justify-center gap-1 w-full">
<span class="font-body-sm text-body-sm text-text-primary font-medium truncate">Utama</span>
<span class="material-symbols-outlined text-[16px] text-text-secondary">expand_more</span>
</div>
</button>
</div>
<!-- Direction Arrow -->
<div class="absolute left-1/2 top-1/2 w-12 h-12 flex items-center justify-center bg-primary rounded-full text-on-primary z-10 border-[6px] border-surface animate-indicator shadow-md">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</div>
<!-- Ke Pocket -->
<div class="flex-1 text-center pl-md">
<p class="font-label-caps text-label-caps text-text-secondary mb-xs">Ke Pocket</p>
<button class="w-full flex flex-col items-center justify-center gap-1 p-sm rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-colors border border-dashed border-outline-variant hover:border-primary-soft">
<div class="w-8 h-8 rounded-full bg-surface-container-low flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-text-secondary text-[18px]">add</span>
</div>
<div class="flex items-center justify-center gap-1 w-full">
<span class="font-body-sm text-body-sm text-text-secondary font-medium truncate">Pilih Tujuan</span>
</div>
</button>
</div>
</div>
<!-- Validation Hint (Neutral/Warning Style) -->
<div class="flex items-start gap-2 mt-md p-md rounded-xl bg-surface-container-low border border-surface-variant">
<span class="material-symbols-outlined text-[18px] text-text-secondary mt-0.5">info</span>
<p class="font-body-sm text-body-sm text-text-secondary leading-snug">Pocket asal &amp; tujuan tidak boleh sama. Pastikan memilih pocket yang berbeda.</p>
</div>
</section>
<!-- Transfer Details Form -->
<section class="px-lg flex flex-col gap-xl">
<!-- Tipe Transfer -->
<div>
<p class="font-label-caps text-label-caps text-text-secondary mb-md">Tipe Transfer</p>
<div class="flex flex-wrap gap-sm">
<button class="px-xl py-md rounded-full bg-primary text-on-primary font-body-sm text-body-sm font-medium shadow-[0_4px_12px_rgba(0,74,198,0.2)] flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">sync_alt</span>
                        Normal
                    </button>
<button class="px-xl py-md rounded-full bg-surface text-text-primary border border-surface-variant font-body-sm text-body-sm hover:bg-surface-container-low transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">payments</span>
                        Tarik Tunai
                    </button>
<button class="px-xl py-md rounded-full bg-surface text-text-primary border border-surface-variant font-body-sm text-body-sm hover:bg-surface-container-low transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">contactless</span>
                        Top up NFC
                    </button>
</div>
</div>
<!-- Tanggal & Waktu -->
<div class="flex gap-md">
<div class="flex-1 relative group">
<p class="font-label-caps text-label-caps text-text-secondary mb-xs">Tanggal</p>
<div class="flex items-center justify-between p-md rounded-xl bg-surface border border-surface-variant group-hover:border-primary-soft transition-colors cursor-pointer">
<span class="font-body-sm text-body-sm text-text-primary">Hari ini</span>
<span class="material-symbols-outlined text-text-secondary text-[20px]">calendar_today</span>
</div>
</div>
<div class="flex-1 relative group">
<p class="font-label-caps text-label-caps text-text-secondary mb-xs">Waktu</p>
<div class="flex items-center justify-between p-md rounded-xl bg-surface border border-surface-variant group-hover:border-primary-soft transition-colors cursor-pointer">
<span class="font-body-sm text-body-sm text-text-primary">Sekarang</span>
<span class="material-symbols-outlined text-text-secondary text-[20px]">schedule</span>
</div>
</div>
</div>
<!-- Catatan -->
<div>
<p class="font-label-caps text-label-caps text-text-secondary mb-xs flex justify-between">
<span>Catatan</span>
<span class="text-outline font-normal">Opsional</span>
</p>
<div class="relative">
<textarea class="w-full p-md rounded-xl bg-surface border border-surface-variant focus:border-primary focus:ring-2 focus:ring-primary-soft outline-none font-body-sm text-body-sm text-text-primary resize-none h-28 placeholder:text-outline transition-all" placeholder="Tulis tujuan transfer atau pengingat..."></textarea>
<span class="material-symbols-outlined absolute bottom-md right-md text-outline text-[20px] pointer-events-none">edit_note</span>
</div>
</div>
</section>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 left-0 right-0 w-full max-w-[480px] mx-auto p-lg bg-gradient-to-t from-background via-background to-transparent z-50 pt-xl">
<button class="w-full py-xl rounded-full bg-primary text-on-primary font-headline-sm text-headline-sm font-bold shadow-[0_8px_24px_rgba(0,74,198,0.3)] hover:shadow-[0_12px_28px_rgba(0,74,198,0.4)] hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2">
<span>Simpan Transfer</span>
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'wght' 600;">check_circle</span>
</button>
</div>
</main>
<script>
        // Simple interaction script to enhance the tactile feel
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', function() {
                this.style.transform = 'scale(0.97)';
            });
            btn.addEventListener('mouseup', function() {
                this.style.transform = '';
            });
            btn.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });

        // Amount input formatter (basic)
        const amountInput = document.querySelector('input[type="text"]');
        amountInput.addEventListener('input', function(e) {
            let val = this.value.replace(/\D/g, '');
            if(val !== '') {
                this.value = new Intl.NumberFormat('id-ID').format(val);
            }
        });
    </script>
</body></html>
