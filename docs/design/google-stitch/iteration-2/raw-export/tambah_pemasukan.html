        </button>

<script>
        // Simple interaction for the amount input underline effect
        const amountInput = document.querySelector('input[type="tel"]');
        const activeLine = amountInput.nextElementSibling.nextElementSibling;

        amountInput.addEventListener('focus', () => {
            activeLine.style.transform = 'translate(-50%) scaleX(1)';
        });
        amountInput.addEventListener('blur', () => {
            activeLine.style.transform = 'translate(-50%) scaleX(0)';
        });
        
        // Auto-format currency (basic implementation)
        amountInput.addEventListener('input', function(e) {
            let val = this.value.replace(/[^0-9]/g, '');
            if(val) {
                this.value = parseInt(val).toLocaleString('id-ID');
            } else {
                this.value = '0';
            }
        });
    </script>
