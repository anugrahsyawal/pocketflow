<body class="bg-background text-on-background antialiased min-h-screen flex justify-center">
<div class="w-full max-w-[480px] bg-background relative min-h-screen shadow-2xl flex flex-col overflow-hidden">
<!-- TopAppBar Placeholder (Hidden under overlay) -->
<header class="bg-background dark:bg-on-background font-headline-md text-headline-md flex justify-between items-center w-full px-lg py-md max-w-[480px] mx-auto docked full-width top-0 z-10">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-text-secondary" data-icon="person">person</span>
</div>
<h1 class="font-headline-md text-headline-md font-extrabold text-primary dark:text-primary-fixed">PocketFlow</h1>
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-text-secondary" data-icon="visibility">visibility</span>
</button>
</header>
<!-- Main Content Area (Dimmed by Overlay) -->
<main class="flex-1 px-lg py-xl space-y-xl opacity-20 filter blur-sm transition-all duration-300">
<!-- Simulated Content -->

<div class="flex justify-between items-start mb-sm">
<h2 class="font-body-lg text-body-lg text-text-secondary">Main Pocket</h2>
<span class="text-2xl">💰</span>
</div>
<div class="font-amount-md text-amount-md text-text-primary mb-xl">Rp 4.500.000</div>
<div class="flex items-center space-x-sm mb-sm">
<div class="px-3 py-1 bg-success-soft text-aman-success rounded-full font-label-caps text-label-caps">Aman</div>
<span class="font-body-sm text-body-sm text-text-secondary">Rp 150k / hari</span>
</div>
<div class="w-full h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-1/3 h-full bg-aman-success rounded-full"></div>
</div>
</div>
<div class="space-y-md">
<h3 class="font-headline-sm text-headline-sm text-text-primary">Hari Ini</h3>
<div class="bg-surface rounded-xl p-md flex items-center shadow-[0_2px_8px_rgba(0,74,198,0.05)]">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center mr-md">
<span class="text-xl">☕</span>
</div>
<div class="flex-1">
<div class="font-body-lg text-body-lg text-text-primary font-bold">Kopi Sore</div>
<div class="font-body-sm text-body-sm text-text-secondary">Main Pocket</div>
</div>
<div class="font-body-lg text-body-lg text-text-primary font-bold">-Rp 45.000</div>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden under overlay) -->
<nav class="bg-surface dark:bg-surface-container-highest shadow-[0_-4px_20px_0_rgba(0,74,198,0.1)] fixed bottom-0 left-0 right-0 w-full max-w-[480px] mx-auto flex justify-around items-end px-gutter pb-safe h-20 z-0 rounded-t-3xl opacity-20 filter blur-sm">
<a class="flex flex-col items-center justify-center text-text-secondary dark:text-outline-variant p-2 hover:bg-surface-container-low dark:hover:bg-surface-dim transition-colors" href="#">

</a>

</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim bg-primary text-on-primary rounded-full -translate-y-4 w-14 h-14 shadow-lg hover:bg-surface-container-low dark:hover:bg-surface-dim transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="font-label-caps text-label-caps sr-only">Add</span>

<div class="absolute inset-0 bg-inverse-surface/40 backdrop-blur-sm z-40 transition-opacity" id="overlay-bg"></div>

<div class="p-lg grid grid-cols-2 gap-md">

<span class="font-body-sm text-body-sm text-text-secondary mt-xs">Catat jajanmu</span>
</button>
<!-- Pemasukan (Income) -->

</button>
<!-- Transfer -->

</div>
<span class="font-body-lg text-body-lg text-text-primary font-bold">Auto-Scan</span>
<span class="font-body-sm text-body-sm text-text-secondary mt-xs">Paste Struk</span>
</button>
</div>
<!-- Bottom safe area padding -->
<div class="h-6"></div>
</div>
</div>
<script>
        // Simple script to handle bottom sheet closing interaction for demo purposes
        document.querySelector('button[data-icon="close"]')?.parentElement.addEventListener('click', () => {
            const sheet = document.getElementById('bottom-sheet');
            const bg = document.getElementById('overlay-bg');
            const main = document.querySelector('main');
            const nav = document.querySelector('nav');
            
            sheet.style.transform = 'translateY(100%)';
            sheet.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
            bg.style.opacity = '0';
            
            main.classList.remove('opacity-20', 'blur-sm');
            nav.classList.remove('opacity-20', 'blur-sm');
            
            setTimeout(() => {
                sheet.style.display = 'none';
                bg.style.display = 'none';
            }, 300);
        });
    </script>
