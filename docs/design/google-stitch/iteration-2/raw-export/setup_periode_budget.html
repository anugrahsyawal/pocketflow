<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg antialiased">
<!-- Top Navigation / Progress -->
<header class="w-full max-w-[480px] mx-auto px-safe-margin py-md flex items-center justify-between">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-highest text-text-secondary hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[480px] mx-auto px-safe-margin py-xl flex flex-col">
<!-- Header Section -->
<div class="mb-2xl text-center space-y-sm">
<div class="w-16 h-16 mx-auto mb-lg bg-surface-container-highest rounded-2xl flex items-center justify-center shadow-sm">
<span class="text-3xl">🗓️</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">Kapan periode gajianmu dimulai?</h1>
<p class="font-body-lg text-body-lg text-text-secondary">Pilih tanggal untuk mereset budget kamu setiap bulannya.</p>
</div>
<!-- Date Selection Card -->
<div class="bg-surface rounded-4xl p-xl shadow-[0_8px_30px_rgb(0,74,198,0.08)] flex flex-col items-center border border-surface-container-low mb-xl relative overflow-hidden">
<!-- Decorative background element -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-soft rounded-full opacity-50 blur-xl"></div>
<p class="font-label-caps text-label-caps text-text-secondary uppercase tracking-wider mb-lg z-10">Pilih Tanggal</p>
<!-- Date Picker Spinner (Visual Mockup) -->
<div class="h-40 w-full relative flex items-center justify-center overflow-hidden z-10 mask-image:linear-gradient(to_bottom,transparent,black_20%,black_80%,transparent)]">
<!-- Selection Highlight -->
<div class="absolute w-2/3 h-14 bg-primary-soft/50 rounded-2xl border border-primary-fixed top-1/2 -translate-y-1/2 -z-10 shadow-inner"></div>
<div class="flex flex-col items-center space-y-4 text-center">
<div class="font-amount-md text-amount-md text-text-secondary opacity-30 cursor-pointer">24</div>
<div class="font-amount-md text-amount-md text-text-secondary opacity-60 cursor-pointer">25</div>
<div class="font-amount-lg text-amount-lg text-primary transform scale-110 transition-transform">26</div>
<div class="font-amount-md text-amount-md text-text-secondary opacity-60 cursor-pointer">27</div>
<div class="font-amount-md text-amount-md text-text-secondary opacity-30 cursor-pointer">28</div>
</div>
</div>
</div>
<!-- Preview Card -->
<div class="mt-auto bg-surface-container-low rounded-2xl p-lg flex items-center gap-md border border-surface-container-highest">
<div class="w-10 h-10 rounded-full bg-info-blue/10 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-info-blue" style="font-variation-settings: 'FILL' 1;">sync</span>
</div>
<div>
<p class="font-body-sm text-body-sm text-text-secondary">Budget kamu akan direset setiap</p>
<p class="font-headline-sm text-headline-sm text-on-surface">26 Jul - 25 Agu</p>
</div>
</div>
</main>

<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-4 rounded-full shadow-[0_8px_20px_rgb(0,74,198,0.25)] hover:bg-surface-tint active:scale-95 transition-all flex items-center justify-center gap-2">
