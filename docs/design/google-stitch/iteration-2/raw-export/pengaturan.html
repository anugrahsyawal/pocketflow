<style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #004ac6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #004ac6;
        }
        .toggle-checkbox:checked + .toggle-label:after {
            transform: translateX(100%);
            border-color: white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- Shared Component: TopAppBar -->
<header class="bg-background docked full-width top-0 z-40 relative">
<div class="flex justify-between items-center w-full px-lg py-md max-w-[480px] mx-auto">
<!-- Leading Avatar -->
<button class="w-10 h-10 rounded-full overflow-hidden shadow-sm hover:opacity-80 transition-opacity focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<img alt="User profile avatar" class="w-full h-full object-cover" data-alt="A brightly lit, high-quality profile portrait of a smiling young adult with a clean, modern aesthetic, set against a soft cream (#fff8f2) background, perfectly matching the PocketFlow app's warm, approachable, and playful personal finance style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2DWFVBTmiP27qRoR8aKlx2D5ZH7S6XNYqEdoUK8wwxxN6vorS88sAfdiKdanmQna6WzNoLxiXHyayqhxp01GPx-PL_imJnp3yPrTxXapWJA1M4zXaYL38gJJ0QwhHJ6aeb-c3nmhwiyQ3xrW2nVe0MqgkeM6jozdIQHEtNGwcAiPyr4nPxlmUlni3GCIuUFyAKFSiH5NScp86y9rHvUA80rHjx96Qxr9YSwHsV0bTaP0Cm1idvEp3SgNXGYUDGRslzgk9AN5syyQ"/>
</button>
<!-- Headline -->
<h1 class="font-headline-md text-headline-md font-extrabold text-primary">PocketFlow</h1>
<!-- Trailing Icon -->
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-150 focus:outline-none flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[480px] mx-auto px-lg py-xl pb-3xl space-y-xl">
<!-- Page Title -->
<div class="px-sm mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary">Pengaturan</h2>
<p class="font-body-sm text-body-sm text-text-secondary mt-1">Sesuaikan preferensi dan kelola data Pockets kamu.</p>
</div>
<!-- Section: Preferensi Umum -->
<section>
<h3 class="font-label-caps text-label-caps text-text-secondary px-sm mb-md tracking-wider">PREFERENSI UMUM</h3>
<div class="bg-surface rounded-3xl shadow-[0_4px_24px_0_rgba(0,74,198,0.06)] overflow-hidden flex flex-col border border-surface-container-highest">
<!-- Akun -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none">
<div class="w-10 h-10 rounded-2xl bg-primary-soft text-primary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">person</span>
</div>
<div class="ml-md flex-1">
<span class="font-body-lg text-body-lg text-text-primary group-hover:text-primary transition-colors">Akun</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
<hr class="border-surface-variant mx-lg"/>
<!-- Sembunyikan Saldo -->
<div class="flex items-center justify-between p-lg hover:bg-surface-container-low transition-colors">
<div class="flex items-center">
<div class="w-10 h-10 rounded-2xl bg-primary-soft text-primary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">visibility_off</span>
</div>
<div class="ml-md">
<span class="font-body-lg text-body-lg text-text-primary block">Sembunyikan Saldo</span>
<span class="font-body-sm text-body-sm text-text-secondary">Blur total uang di halaman utama</span>
</div>
</div>
<!-- Custom Toggle -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-surface-variant appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" id="toggle1" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out" for="toggle1"></label>
</div>
</div>
<hr class="border-surface-variant mx-lg"/>
<!-- Periode Budget -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none">
<div class="w-10 h-10 rounded-2xl bg-primary-soft text-primary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">date_range</span>
</div>
<div class="ml-md flex-1">
<span class="font-body-lg text-body-lg text-text-primary group-hover:text-primary transition-colors">Periode Budget</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
</div>
</section>
<!-- Section: Pengaturan Transaksi -->
<section>
<h3 class="font-label-caps text-label-caps text-text-secondary px-sm mb-md tracking-wider">PENGATURAN TRANSAKSI</h3>
<div class="bg-surface rounded-3xl shadow-[0_4px_24px_0_rgba(0,74,198,0.06)] overflow-hidden flex flex-col border border-surface-container-highest">
<!-- Kelola Pocket -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none">
<div class="w-10 h-10 rounded-2xl bg-warning-soft text-waspada-warning flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div class="ml-md flex-1">
<span class="font-body-lg text-body-lg text-text-primary group-hover:text-waspada-warning transition-colors">Kelola Pocket</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-waspada-warning transition-colors">chevron_right</span>
</button>
<hr class="border-surface-variant mx-lg"/>
<!-- Kelola Kategori -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none">
<div class="w-10 h-10 rounded-2xl bg-success-soft text-aman-success flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">category</span>
</div>
<div class="ml-md flex-1">
<span class="font-body-lg text-body-lg text-text-primary group-hover:text-aman-success transition-colors">Kelola Kategori</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-aman-success transition-colors">chevron_right</span>
</button>
</div>
</section>
<!-- Section: Data & Sinkronisasi (Sprint 2) -->
<section>
<h3 class="font-label-caps text-label-caps text-text-secondary px-sm mb-md tracking-wider">DATA &amp; SINKRONISASI</h3>
<div class="bg-surface rounded-3xl shadow-[0_4px_24px_0_rgba(0,74,198,0.06)] overflow-hidden flex flex-col border border-surface-container-highest opacity-75">
<!-- Ekspor CSV -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none cursor-not-allowed">
<div class="w-10 h-10 rounded-2xl bg-surface-container text-outline-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">download</span>
</div>
<div class="ml-md flex-1 flex items-center">
<span class="font-body-lg text-body-lg text-text-secondary">Ekspor CSV</span>
<span class="ml-sm font-label-caps text-label-caps bg-surface-variant text-text-secondary px-2 py-0.5 rounded-md">Sprint 2</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<hr class="border-surface-variant mx-lg"/>
<!-- Backup/Restore -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none cursor-not-allowed">
<div class="w-10 h-10 rounded-2xl bg-surface-container text-outline-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">settings_backup_restore</span>
</div>
<div class="ml-md flex-1 flex items-center">
<span class="font-body-lg text-body-lg text-text-secondary">Backup/Restore</span>
<span class="ml-sm font-label-caps text-label-caps bg-surface-variant text-text-secondary px-2 py-0.5 rounded-md">Sprint 2</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<hr class="border-surface-variant mx-lg"/>
<!-- Status Sinkron -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none cursor-not-allowed">
<div class="w-10 h-10 rounded-2xl bg-surface-container text-outline-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">sync</span>
</div>
<div class="ml-md flex-1 flex items-center">
<span class="font-body-lg text-body-lg text-text-secondary">Status Sinkron</span>
<span class="ml-sm font-label-caps text-label-caps bg-surface-variant text-text-secondary px-2 py-0.5 rounded-md">Sprint 2</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
</div>
</section>
<!-- Section: Lainnya -->
<section class="pb-xl">
<div class="bg-surface rounded-3xl shadow-[0_4px_24px_0_rgba(0,74,198,0.06)] overflow-hidden flex flex-col border border-surface-container-highest">
<!-- Tentang Aplikasi -->
<button class="flex items-center w-full p-lg text-left hover:bg-surface-container-low transition-colors group focus:outline-none">
<div class="w-10 h-10 rounded-2xl bg-surface-container text-text-primary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">info</span>
</div>
<div class="ml-md flex-1">
<span class="font-body-lg text-body-lg text-text-primary group-hover:text-primary transition-colors">Tentang Aplikasi</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">chevron_right</span>
</button>
<hr class="border-surface-variant mx-lg"/>
<!-- Keluar -->
<button class="flex items-center w-full p-lg text-left hover:bg-danger-soft transition-colors group focus:outline-none">
<div class="w-10 h-10 rounded-2xl bg-danger-soft text-bahaya-danger flex items-center justify-center shrink-0">
<span class="material-symbols-outlined">logout</span>
</div>
<div class="ml-md flex-1">
<span class="font-body-lg text-body-lg font-bold text-bahaya-danger">Keluar</span>
</div>
</button>
</div>
</section>
</main>
<!-- BottomNavBar is suppressed based on the rule for task-focused / sub-page screens (Settings). -->
