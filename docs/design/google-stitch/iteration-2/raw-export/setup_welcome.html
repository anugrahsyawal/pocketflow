<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>PocketFlow - Setup Wizard</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Design System Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#005320",
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#ffdbca",
                    "waspada-warning": "#F59E0B",

                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#002109",
                    "inverse-surface": "#33302c",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#434655",
                    "outline-variant": "#c3c6d7",
                    "surface-container-low": "#f9f2ec",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#004ac6",
                    "surface-tint": "#0053db",
                    "surface-dim": "#dfd9d2",
                    "tertiary": "#006329",
                    "on-primary-container": "#eeefff",
                    "primary-soft": "#DBEAFE",
                    "primary-fixed": "#dbe1ff",
                    "inverse-primary": "#b4c5ff",
                    "primary-container": "#2563eb",
                    "on-secondary-fixed": "#341100",
                    "text-primary": "#1F2937",
                    "text-secondary": "#6B7280",
                    "outline": "#737686",
                    "background": "#fff8f2",
                    "secondary": "#9d4300",
                    "surface-container-highest": "#e8e1db",
                    "error-container": "#ffdad6",
                    "surface-variant": "#e8e1db",
                    "on-secondary-fixed-variant": "#783200",
                    "success-soft": "#DCFCE7",
                    "surface-container-high": "#eee7e0",
                    "error": "#ba1a1a",
                    "danger-soft": "#FEE2E2",
                    "aman-success": "#16A34A",
                    "on-secondary-container": "#5c2400",
                    "surface-container": "#f4ede6",
                    "surface": "#FFFFFF",
                    "tertiary-fixed": "#7ffc97",
                    "warning-soft": "#FEF3C7",
                    "surface-bright": "#fff8f2",
                    "info-blue": "#0EA5E9",
                    "on-surface": "#1e1b17",
                    "tertiary-container": "#007f36",
                    "on-primary-fixed": "#00174b",
                    "secondary-container": "#fd761a",
                    "on-primary-fixed-variant": "#003ea8",
                    "primary-fixed-dim": "#b4c5ff",
                    "bahaya-danger": "#DC2626",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f6f0e9",
                    "on-tertiary-container": "#c7ffca",
                    "secondary-fixed-dim": "#ffb690",
                    "on-background": "#1e1b17"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "8px",
                    "gutter": "12px",
                    "3xl": "40px",
                    "safe-margin": "16px",
                    "2xl": "32px",
                    "lg": "16px",
                    "xl": "24px",
                    "md": "12px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "headline-md": ["Nunito Sans", "sans-serif"],
                    "headline-lg": ["Nunito Sans", "sans-serif"],
                    "amount-lg": ["Nunito Sans", "sans-serif"],
                    "body-lg": ["Inter", "sans-serif"],
                    "headline-lg-mobile": ["Nunito Sans", "sans-serif"],
                    "amount-md": ["Inter", "sans-serif"],
                    "label-caps": ["Inter", "sans-serif"],
                    "body-sm": ["Inter", "sans-serif"],
                    "headline-sm": ["Nunito Sans", "sans-serif"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg": ["32px", {"lineHeight": "38px", "letterSpacing": "-0.03em", "fontWeight": "800"}],
                    "amount-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.04em", "fontWeight": "900"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "800"}],
                    "amount-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "700"}]
            }
          },
        }
      }
    </script>
<style>
        /* Import fonts directly to ensure they load correctly with the config */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Nunito+Sans:wght@700;800;900&display=swap');
        
        body {
            background-color: theme('colors.background');
            -webkit-tap-highlight-color: transparent;
        }

        /* Subtle ambient pulse for the hero element */
        @keyframes softPulse {
            0% { transform: scale(1); filter: drop-shadow(0 10px 15px rgba(0, 74, 198, 0.05)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 20px 25px rgba(0, 74, 198, 0.1)); }
            100% { transform: scale(1); filter: drop-shadow(0 10px 15px rgba(0, 74, 198, 0.05)); }
        }
        .hero-emoji-container {
            animation: softPulse 4s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Fluid Mobile Container -->
<main class="w-full max-w-[480px] h-[884px] flex flex-col relative px-lg py-xl bg-background mx-auto shadow-2xl md:shadow-xl md:rounded-[40px] md:h-[850px] md:max-h-[795px] md:my-auto overflow-hidden">
<!-- Decorative Ambient Background Blobs -->
<div class="absolute top-[-10%] left-[-20%] w-[80%] h-[40%] bg-primary-soft rounded-full mix-blend-multiply filter blur-3xl opacity-50 z-0"></div>
<div class="absolute bottom-[-10%] right-[-20%] w-[60%] h-[50%] bg-secondary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-30 z-0"></div>
<!-- Content Wrapper (above decorative background) -->
<div class="relative z-10 flex flex-col h-full w-full">
<!-- Top Progress Indicator -->
<header class="w-full pt-safe-margin mb-8 flex justify-center items-center gap-2 px-md">
<div class="h-2 flex-1 rounded-full bg-primary transition-all duration-500 ease-out"></div>
<div class="h-2 flex-1 rounded-full bg-surface-container-highest opacity-50"></div>
<div class="h-2 flex-1 rounded-full bg-surface-container-highest opacity-50"></div>
<div class="h-2 flex-1 rounded-full bg-surface-container-highest opacity-50"></div>
</header>
<!-- Hero Section (Centered) -->
<section class="flex-1 flex flex-col items-center justify-center text-center w-full px-4 mt-[-5%]">
<!-- Large Friendly Emoji / Illustration Area -->
<div class="hero-emoji-container relative w-48 h-48 mb-8 flex items-center justify-center bg-surface rounded-full shadow-[0_20px_40px_-15px_rgba(0,74,198,0.1)] border border-surface-container-lowest">
<span class="text-[90px] leading-none select-none">👛</span>
<!-- Small decorative sparkles -->
<span class="absolute top-4 right-4 text-2xl text-secondary-container animate-bounce" style="animation-duration: 2s;">✨</span>
<span class="absolute bottom-8 left-4 text-xl text-primary animate-pulse" style="animation-duration: 3s;">✨</span>
</div>
<!-- Copy -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary mb-md max-w-[280px]">
                    Selamat Datang di <span class="text-primary font-extrabold">PocketFlow!</span> <span class="inline-block origin-bottom-right animate-[wiggle_2s_ease-in-out_infinite]" style="animation: wiggle 2s infinite;">👋</span>
</h1>
<p class="font-body-lg text-body-lg text-text-secondary max-w-[300px] leading-relaxed">
                    Mari atur keuanganmu jadi lebih teratur, bebas cemas, dan tentunya menyenangkan.
                </p>
</section>
<!-- Bottom Action Zone (Thumb Zone) -->
<footer class="w-full pb-safe-margin mt-auto">
<button class="w-full py-4 bg-primary text-on-primary rounded-full font-headline-sm text-headline-sm shadow-[0_8px_20px_-6px_rgba(0,74,198,0.4)] hover:bg-surface-tint hover:shadow-[0_12px_24px_-8px_rgba(0,74,198,0.5)] active:scale-95 transition-all duration-200 flex items-center justify-center gap-xs relative overflow-hidden group" onclick="this.classList.add('scale-95'); setTimeout(() =&gt; this.classList.remove('scale-95'), 150);">
<span class="relative z-10">Mulai Setup</span>
<span class="material-symbols-outlined relative z-10 text-[20px] group-hover:translate-x-1 transition-transform" data-weight="fill">arrow_forward</span>
<!-- Ripple effect container -->
<div class="absolute inset-0 bg-white opacity-0 group-active:opacity-20 transition-opacity duration-150"></div>
</button>
</footer>
</div>
</main>
<style>
        @keyframes wiggle {
            0% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
            60% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</body></html>
